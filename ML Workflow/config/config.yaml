  xgboost:
      model_status: true
      params:
        n_jobs: -1
        n_estimators: 500
        max_depth: 4
        learning_rate: 0.05
        subsample: 0.8
        colsample_bytree: 0.8
        reg_lambda: 1.0
        reg_alpha: 0.0
        min_child_weight: 1
        tree_method: 'hist'


  gradient_boosting:
    model_status: true
    params:
      n_estimators: 200          
      max_depth: 5               
      learning_rate: 0.05  
      subsample: 0.8             
      max_features: 'sqrt'      
      min_samples_split: 5        
      min_samples_leaf: 2        
      min_weight_fraction_leaf: 0.0
      validation_fraction: 0.1
